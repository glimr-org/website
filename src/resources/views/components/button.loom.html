---
import gleam/string

props(variant: String, href: String, size: String)
---

<!-- if no href is present, then use a regular button-->
<button
  l-if="string.is_empty(href)"
  :class="[
    'font-medium rounded-[9px] cursor-pointer transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 inline-block text-center',
    case size {
      'sm' -> 'py-2 px-4 text-[13.5px]'
      'lg' -> 'py-3 px-8 text-[17px]'
      _ -> 'py-2.5 px-6 text-[17px] sm:text-[16px]'
    },
    case variant {
      'secondary' -> 'bg-mist-100 text-gray-700 hover:bg-mist-200 focus:ring-mist-400'
      'danger' -> 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-500'
      _ -> 'bg-[#F9B1D8] hover:bg-[#FFC9E6] focus:ring-pink-100 font-semibold text-[#2C2E49] shadow-[0_2px_21px_#FFA9D4]'
    },
  ]"
>
  <slot />
</button>

<!-- if there's an href present, use an anchor tag -->
<a
  l-else
  :href="href"
  :class="[
    'font-medium rounded-[9px] cursor-pointer transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 inline-block text-center',
    case size {
      'sm' -> 'py-2 px-4 text-[13.5px]'
      'lg' -> 'py-3 px-8 text-[17px]'
      _ -> 'py-2.5 px-6 text-[17px] sm:text-[16px]'
    },
    case variant {
      'secondary' -> 'bg-slate-100 text-gray-700 hover:bg-slate-200 focus:ring-slate-400'
      'danger' -> 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-500'
      _ -> 'bg-[#F9B1D8] hover:bg-[#FFC9E6] focus:ring-pink-300 font-semibold text-[#2C2E49] shadow-[0_2px_21px_#FFA9D4]'
    },
  ]"
>
  <slot />
</a>
