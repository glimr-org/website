<div class="newsletter-form-container">
  <form
    class="newsletter-form flex flex-col items-center justify-center w-full"
    action="https://app.loops.so/api/newsletter-form/cmngcu4qw06040i1gk8qx2tew"
    method="POST"
  >
    <input
      class="newsletter-form-input w-full max-w-md px-3 py-2 mb-2.5 text-[#2C2E49] bg-white border border-mist-200 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-mist-500 focus:border-transparent placeholder:text-mist-400"
      placeholder="you@example.com"
      required=""
      type="email"
      name="newsletter-form-input"
    />
    <button
      type="submit"
      class="newsletter-form-button w-full max-w-md py-2.5 px-6 text-[17px] sm:text-[16px] font-semibold text-[#2C2E49] bg-[#F9B1D8] hover:bg-[#FFC9E6] rounded-[9px] shadow-[0_2px_21px_#FFA9D4] cursor-pointer transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-100 text-center"
    >
      Subscribe
    </button>
    <button
      type="button"
      class="newsletter-loading-button hidden w-full max-w-md py-2.5 px-6 text-[17px] sm:text-[16px] font-semibold text-[#2C2E49] bg-[#F9B1D8] rounded-[9px] shadow-[0_2px_21px_#FFA9D4] items-center justify-center cursor-pointer text-center"
    >
      Please wait...
    </button>
  </form>

  <div class="newsletter-success hidden items-center justify-center w-full">
    <p class="text-sm text-[#2C2E49]">Thanks! We'll be in touch!</p>
  </div>

  <div class="newsletter-error hidden items-center justify-center w-full">
    <p class="newsletter-error-message text-sm text-red-600">
      Oops! Something went wrong, please try again
    </p>
  </div>

  <button
    class="newsletter-back-button hidden mx-auto mt-2.5 text-sm text-mist-500 hover:underline bg-transparent border-none cursor-pointer"
    type="button"
  >
    &larr; Back
  </button>
</div>

<script>
  function submitHandler(event) {
    event.preventDefault();
    var container = event.target.parentNode;
    var form = container.querySelector(".newsletter-form");
    var formInput = container.querySelector(".newsletter-form-input");
    var success = container.querySelector(".newsletter-success");
    var errorContainer = container.querySelector(".newsletter-error");
    var errorMessage = container.querySelector(".newsletter-error-message");
    var backButton = container.querySelector(".newsletter-back-button");
    var submitButton = container.querySelector(".newsletter-form-button");
    var loadingButton = container.querySelector(".newsletter-loading-button");

    const rateLimit = () => {
      errorContainer.style.display = "flex";
      errorMessage.innerText =
        "Too many signups, please try again in a little while";
      submitButton.style.display = "none";
      formInput.style.display = "none";
      backButton.style.display = "block";
    };

    var time = new Date();
    var timestamp = time.valueOf();
    var previousTimestamp = localStorage.getItem("loops-form-timestamp");

    if (previousTimestamp && Number(previousTimestamp) + 60000 > timestamp) {
      rateLimit();
      return;
    }
    localStorage.setItem("loops-form-timestamp", timestamp);

    submitButton.style.display = "none";
    loadingButton.style.display = "flex";

    var formBody =
      "userGroup=&mailingLists=cmngen9cv15j10i399vacc9dd&email=" +
      encodeURIComponent(formInput.value);
    fetch(event.target.action, {
      method: "POST",
      body: formBody,
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
      },
    })
      .then((res) => [res.ok, res.json(), res])
      .then(([ok, dataPromise, res]) => {
        if (ok) {
          success.style.display = "flex";
          form.reset();
        } else {
          dataPromise.then((data) => {
            errorContainer.style.display = "flex";
            errorMessage.innerText = data.message
              ? data.message
              : res.statusText;
          });
        }
      })
      .catch((error) => {
        if (error.message === "Failed to fetch") {
          rateLimit();
          return;
        }
        errorContainer.style.display = "flex";
        if (error.message) errorMessage.innerText = error.message;
        localStorage.setItem("loops-form-timestamp", "");
      })
      .finally(() => {
        formInput.style.display = "none";
        loadingButton.style.display = "none";
        backButton.style.display = "block";
      });
  }

  function resetFormHandler(event) {
    var container = event.target.parentNode;
    var formInput = container.querySelector(".newsletter-form-input");
    var success = container.querySelector(".newsletter-success");
    var errorContainer = container.querySelector(".newsletter-error");
    var errorMessage = container.querySelector(".newsletter-error-message");
    var backButton = container.querySelector(".newsletter-back-button");
    var submitButton = container.querySelector(".newsletter-form-button");

    success.style.display = "none";
    errorContainer.style.display = "none";
    errorMessage.innerText = "Oops! Something went wrong, please try again";
    backButton.style.display = "none";
    formInput.style.display = "flex";
    submitButton.style.display = "flex";
  }

  var formContainers = document.getElementsByClassName(
    "newsletter-form-container",
  );

  for (var i = 0; i < formContainers.length; i++) {
    var formContainer = formContainers[i];
    var handlersAdded = formContainer.classList.contains(
      "newsletter-handlers-added",
    );
    if (handlersAdded) continue;
    formContainer
      .querySelector(".newsletter-form")
      .addEventListener("submit", submitHandler);
    formContainer
      .querySelector(".newsletter-back-button")
      .addEventListener("click", resetFormHandler);
    formContainer.classList.add("newsletter-handlers-added");
  }
</script>
